<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calendário com Google OAuth</title>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
  <h1>Meu Calendário</h1>
  <button id="authorize_button">Login com Google</button>
  <button id="signout_button">Logout</button>

  <form id="eventForm">
    <label>Título do evento:</label>
    <input type="text" id="eventTitle" required><br>
    <label>Data e hora início:</label>
    <input type="datetime-local" id="startTime" required><br>
    <label>Data e hora fim:</label>
    <input type="datetime-local" id="endTime" required><br>
    <button type="submit">Adicionar evento</button>
  </form>

  <script>
    // 🔑 Substitua pelos valores do seu projeto no Google Cloud
    const CLIENT_ID = "SEU_CLIENT_ID.apps.googleusercontent.com";
    const API_KEY = "SUA_API_KEY";

    // 📜 Passo 4 – Escopo de acesso
    const SCOPES = "https://www.googleapis.com/auth/calendar.events";
    const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"];

    let authorizeButton = document.getElementById("authorize_button");
    let signoutButton = document.getElementById("signout_button");

    // 📲 Passo 5 – Inicializar cliente OAuth
    function handleClientLoad() {
      gapi.load("client:auth2", initClient);
    }

    function initClient() {
      gapi.client.init({
        apiKey: API_KEY,
        clientId: CLIENT_ID,
        discoveryDocs: DISCOVERY_DOCS,
        scope: SCOPES
      }).then(() => {
        let authInstance = gapi.auth2.getAuthInstance();

        // Botão de login
        authorizeButton.onclick = () => authInstance.signIn().then(() => {
          console.log("Usuário logado:", authInstance.currentUser.get().getBasicProfile().getEmail());
        });

        // Botão de logout
        signoutButton.onclick = () => authInstance.signOut();

        // Formulário de criação de evento
        document.getElementById("eventForm").addEventListener("submit", addEvent);
      });
    }

    // Função para adicionar evento ao Google Calendar
    function addEvent(e) {
      e.preventDefault();
      let event = {
        summary: document.getElementById("eventTitle").value,
        start: { dateTime: document.getElementById("startTime").value },
        end: { dateTime: document.getElementById("endTime").value }
      };

      gapi.client.calendar.events.insert({
        calendarId: "primary",
        resource: event
      }).then(response => {
        alert("Evento criado com sucesso!");
        console.log("Evento:", response);
      });
    }

    handleClientLoad();
  </script>
</body>
</html>
